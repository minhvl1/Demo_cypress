name: Test Project
on: push
jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Install 
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx cypress run --spec 'cypress/e2e/TS03_DemoQA/practiceForm.cy.js'
      
  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Deploy Reports to GitHub pages with History and Retries
        uses: cybersokari/allure-deployer-action@v1.8.0
        with:
          target: 'github'
          github_pages_branch: 'gh-pages'
          allure_results_path: 'allure-results'
          show_history: 'true'
          retries: 1
